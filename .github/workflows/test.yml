name: Test
on: [push, pull_request]

permissions:
  contents: read
  pull-requests: write
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install lint deps
        run: |
          python -m pip install --upgrade "setuptools<82" wheel
          pip install .[dev]
      - name: Run pre-commit
        run: pre-commit run --all-files

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [peachjam, africanlii, liiweb]
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice poppler-utils pandoc
          python -m pip install --upgrade "setuptools<82" wheel
          pip install .[dev]
          pip install psycopg[binary]==3.2.12 unittest-xml-reporting
          npm ci
          npm i -g sass
      - name: Run tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/peach-jam
          TEST_RUNNER: xmlrunner.extra.djangotestrunner.XMLTestRunner
        run: |
          coverage run manage.py test peachjam_subs peachjam_search ${{ matrix.app }} --settings=${{ matrix.app }}.settings
      - name: Generate coverage report
        if: success() || failure()
        run: |
          if [ -f .coverage ]; then
            coverage xml -o coverage-${{ matrix.app }}.xml
          fi
      - name: Publish coverage to Coveralls
        if: ${{ hashFiles(format('coverage-{0}.xml', matrix.app)) != '' }}
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: coverage-${{ matrix.app }}.xml
          format: cobertura
          flag-name: ${{ matrix.app }}
          parallel: true
