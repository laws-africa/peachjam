{% load i18n %}
{% if years %}
  <section id="years-section" aria-labelledby="years-heading" tabindex="-1">
    <h2 id="years-heading" class="h6 visually-hidden skip-link-target">{% trans 'Years' %}</h2>
    <a class="visually-hidden-focusable d-inline-block mb-2"
       href="#{% if months and years %}months-section{% elif doc_table_form_id %}{{ doc_table_form_id }}-filters-section{% else %}{{ doc_table_id }}{% endif %}">{% trans 'Skip past years' %}</a>
    <nav id="years-nav"
         class="pl-0 mt-2 mb-3 d-none d-lg-block"
         aria-labelledby="years-heading">
      <div class="align-items-center d-lg-flex">
        <i class="bi bi-calendar me-2"></i>
        <div>
          <a class="text-nowrap {% if not year %} active{% endif %}"
             href="{{ all_years_url }}">{% trans 'All years' %}</a>
        </div>
        <ul class="year-nav mb-0 ms-2">
          {% for y in years %}
            <li>
              {% if y.year == year %}
                {{ y.year }}
              {% else %}
                {% block year_link %}
                  <a href="{% url "court_year" court.code y.year %}">{{ y.year }}</a>
                {% endblock %}
              {% endif %}
            </li>
          {% endfor %}
        </ul>
      </div>
    </nav>
  </section>
  <label class="form-label d-block d-lg-none mb-1"
         for="court-year-navigation-select">
    {% trans 'Browse by year' %}
  </label>
  <select id="court-year-navigation-select"
          class="form-select mb-3 d-block d-lg-none"
          data-component="NavigationSelect">
    <option value="{{ all_years_url }}">
      {% trans 'All years' %}
    </option>
    {% for y in years %}
      {% block year_option %}
        <option value="{% url "court_year" court.code y.year %}"
                {% if y.year == year %} selected{% endif %}>
          {{ y.year }}
        </option>
      {% endblock %}
    {% endfor %}
  </select>
{% endif %}
